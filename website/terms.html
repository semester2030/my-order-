      <p data-ar="مطبخ البيت منصة إلكترونية تربط بين: (أ) العملاء الراغبين في طلب طعام منزلي، و(ب) مقدمي الخدمة (الطباخين المنزليين) الذين ينتجون طبخاً من بيوتهم أو يقدمون خدمات طبخ داخل منازل العملاء. نقدم: وجبات جاهزة من الطباخين، طبخ الذبائح (الطباخ يأتي ليقوم بطبخ الذبائح في مكانك)، المناسبات والحفلات، والشواء الخارجي. نحن وسيط فقط — لا ننتج الطعام ولا نتحكم بمحتواه." data-en="Home Kitchen is an electronic platform connecting: (a) customers seeking home-cooked food, and (b) service providers (home chefs) who produce cooking from their homes or provide cooking services at customers' locations. We offer: ready meals from chefs, on-site sacrifice cooking (chef comes to cook sacrifices at your location), events & parties, and outdoor BBQ. We are an intermediary only — we do not produce food nor control its content."></p>

    </div>

    </div>

      <p data-ar="الطعام المُعد من المنازل يخضع لمسؤولية مقدم الخدمة. نوصي العملاء بالتحقق من التقييمات والمراجعات. في حال وجود حساسية أو ظروف صحية، يتحمل العميل مسؤولية إبلاغ مقدم الخدمة. المنصة لا تتحمل مسؤولية أي ضرر ناتج عن استهلاك الطعام." data-en="Food prepared from homes is under the service provider's responsibility. We recommend customers check ratings and reviews. In case of allergies or health conditions, the customer is responsible for informing the provider. The platform is not liable for any harm resulting from food consumption."></p>
    </div>
    <div class="legal-section">

      <p data-ar="الأسعار المعروضة نهائية ما لم يُذكر غير ذلك. قد نخصم رسوماً أو عمولات من مقدمي الخدمة. الدفع يتم عبر الطرق المتاحة في التطبيق. في حال طلبات المناسبات أو الطبخ عند الطلب، قد يُطلب دفعة مقدمة أو اتفاق على السعر قبل التنفيذ." data-en="Displayed prices are final unless otherwise stated. We may deduct fees or commissions from service providers. Payment is made through the methods available in the app. For events or on-demand cooking, a deposit or price agreement may be required before execution."></p>
    </div>
