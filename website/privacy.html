<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root" class="legal-page-body">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-ar="سياسة الخصوصية | مطبخ البيت" data-en="Privacy Policy | Home Kitchen">سياسة الخصوصية | مطبخ البيت</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .legal-page-body { background: #FFFBF5 !important; color: #1A1A1A !important; }
    .legal-page { max-width: 720px; margin: 0 auto; padding: 4rem 1.5rem; }
    .legal-page h1 { font-size: 1.75rem; margin-bottom: 2rem; color: #1A1A1A; }
    .legal-section { margin-bottom: 1.5rem; padding: 1rem; background: #F8F9FA; border-radius: 12px; border: 1px solid #F0F0F0; }
    .legal-section h2 { font-size: 1.1rem; margin: 0 0 0.5rem; color: #FF6B35; font-weight: 600; }
    .legal-section p { color: #6C757D; margin: 0; line-height: 1.7; }
    .legal-back { display: inline-block; margin-bottom: 2rem; color: #FF6B35; font-weight: 500; }
    .legal-back:hover { text-decoration: underline; }
    .legal-updated { color: #6C757D; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .legal-page-body .lang-toggle { background: #F8F9FA; border-color: #E0E0E0; color: #1A1A1A; }
    .legal-page-body .lang-toggle:hover { background: #FF6B35; border-color: #FF6B35; color: #fff; }
  </style>
</head>
<body>
  <button id="lang-toggle" class="lang-toggle" aria-label="Switch language"><span id="lang-toggle-text">EN</span></button>
  <div class="legal-page">
    <a href="index.html" class="legal-back" data-ar="← العودة للرئيسية" data-en="← Back to Home"></a>
    <h1 data-ar="سياسة الخصوصية" data-en="Privacy Policy"></h1>
    <p class="legal-updated" data-ar="آخر تحديث: يناير 2026" data-en="Last updated: January 2026"></p>

    <div class="legal-section">
      <h2 data-ar="١. البيانات التي نجمعها" data-en="1. Data We Collect"></h2>
      <p data-ar="نجمع البيانات اللازمة لتقديم الخدمة. للعملاء: رقم الهاتف، البريد الإلكتروني، الاسم، عنوان التوصيل، وبيانات الدفع (تُخزّن بشكل آمن عبر معالجات الدفع). لمقدمي الخدمة: بيانات التسجيل، معلومات المطبخ، الصور والفيديوهات، وأسعار الوجبات." data-en="We collect data necessary to provide the service. For customers: phone number, email, name, delivery address, and payment data (stored securely via payment processors). For service providers: registration data, kitchen info, images/videos, and meal prices."></p>
    </div>
    <div class="legal-section">
      <h2 data-ar="٢. استخدام البيانات" data-en="2. Use of Data"></h2>
      <p data-ar="نستخدم بياناتك لـ: تنفيذ الطلبات وربط العملاء بمقدمي الخدمة، التواصل معك، تحسين الخدمة، عرض المحتوى (مثل فيديوهات الطباخين)، والامتثال للقانون." data-en="We use your data to: process orders and connect customers with providers, communicate with you, improve the service, display content (e.g. chef videos), and comply with the law."></p>
    </div>
    <div class="legal-section">
      <h2 data-ar="٣. مشاركة البيانات" data-en="3. Data Sharing"></h2>
      <p data-ar="لا نبيع بياناتك. نشاركها فقط مع: مقدمي الخدمة (للطلبات) أو العملاء (لتنفيذ الطلب)، شركات التوصيل إن وُجدت، ومعالجات الدفع. قد نشارك بيانات مجمعة (بدون تعريف) لأغراض إحصائية." data-en="We do not sell your data. We share it only with: service providers (for orders) or customers (to fulfill orders), delivery partners if any, and payment processors. We may share aggregated (non-identifying) data for statistical purposes."></p>
    </div>
    <div class="legal-section">
      <h2 data-ar="٤. الأمان" data-en="4. Security"></h2>
      <p data-ar="نحمي بياناتك بتشفير الاتصال (HTTPS)، تخزين آمن للتوكنات، ولا نخزن كلمات المرور بصيغة نصية. نوصي بعدم مشاركة بيانات الدخول مع أي شخص." data-en="We protect your data with encrypted connections (HTTPS), secure token storage, and we never store passwords in plain text. We recommend not sharing login credentials with anyone."></p>
    </div>
    <div class="legal-section">
      <h2 data-ar="٥. حقوقك" data-en="5. Your Rights"></h2>
      <p data-ar="يمكنك طلب الوصول لبياناتك أو تصحيحها أو حذفها عبر التواصل معنا. قد نحتفظ ببعض البيانات للالتزامات القانونية أو حل النزاعات." data-en="You may request access, correction, or deletion of your data by contacting us. We may retain some data for legal obligations or dispute resolution."></p>
    </div>
    <div class="legal-section">
      <h2 data-ar="٦. التواصل" data-en="6. Contact"></h2>
      <p data-ar="لأي استفسار عن الخصوصية: support@homekitchen.app (أو البريد المحدد في التطبيق)." data-en="For privacy inquiries: support@homekitchen.app (or the email specified in the app)."></p>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
