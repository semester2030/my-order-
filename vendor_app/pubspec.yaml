name: vendor_app
description: Vendor app - ويب فيندر (مقدم الخدمة)
publish_to: 'none'
# Phase 20: جاهزية النشر — حدّث version و buildNumber (بعد +) عند كل بناء للنشر.
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.3
  dio: ^5.4.0
  json_annotation: ^4.9.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  image_picker: ^1.0.7
  intl: ^0.20.2
  video_player: ^2.8.2
  url_launcher: ^6.2.5
  geolocator: ^13.0.2
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo/Cairo-Bold.ttf
          weight: 700

# أيقونة التطبيق — مصدر مربع 1024×1024 (نص مطبخ البيت على أبيض)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_launcher_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_launcher_icon.png"
  remove_alpha_ios: true
