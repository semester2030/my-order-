# Render Blueprint — مطبخ البيت Strategy Launch OS
# https://render.com/docs/blueprint-spec
#
# IMPORTANT: Web Service (not Static Site). Root Directory: strategy_platform

services:
  - type: web
    name: matbakh-strategy
    runtime: node
    region: frankfurt
    plan: free
    rootDir: strategy_platform
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: HOSTNAME
        value: "0.0.0.0"
